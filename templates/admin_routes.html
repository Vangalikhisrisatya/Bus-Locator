{% extends "base.html" %}

{% block content %}
<div class="admin-header-nav">
    <a href="{{ url_for('admin_dashboard') }}" class="back-link">← Back to Admin Control Panel</a>
</div>

<div class="dashboard-header">
    <h1>Manage Bus Routes</h1>
    <p class="date-subtitle">Add or remove routes from the directory</p>
</div>

<div class="admin-split-layout">
    <!-- Form to add route -->
    <div class="form-card">
        <h3>Add New Route</h3>
        <p class="form-subtitle">Define a route to track</p>
        
        <form method="POST" action="{{ url_for('admin_routes') }}" class="admin-form">
            <div class="form-group">
                <label for="name">Route Name</label>
                <input type="text" id="name" name="name" required placeholder="e.g., Kakinada via Samalkot">
            </div>
            
            <button type="submit" class="btn-primary btn-large">Add Route</button>
        </form>
    </div>

    <!-- Table of routes -->
    <div class="table-card">
        <h3>Existing Routes</h3>
        <div class="table-responsive">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Route Name</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for route in routes %}
                    <tr>
                        <td>
                            <span class="table-icon">🛣️</span>
                            {{ route.name }}
                        </td>
                        <td style="text-align: right;">
                            <form method="POST" action="{{ url_for('delete_route', route_id=route.id) }}" onsubmit="return confirm('Are you sure you want to delete this route? This will delete today\'s updates for this route.');" style="display: inline;">
                                <button type="submit" class="btn-danger">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
